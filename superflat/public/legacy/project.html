<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — NIRUBAN</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --text: #f0f0f0;
    --gray: #666;
    --border: #333;
    --brand: #2A7AE4;
    --code-bg: #111;
  }

  [data-theme="light"] {
    --bg: #fafafa;
    --text: #0a0a0a;
    --gray: #555;
    --border: #ddd;
    --brand: #1a6bd4;
    --code-bg: #f0f0f0;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.3s, color 0.3s;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .logo { position: fixed; top: 34px; left: 40px; font-size: 22px; font-weight: 400; z-index: 100; }
  .logo a { color: inherit; text-decoration: none; }
  .nav-corner { position: fixed; top: 36px; right: 50px; display: flex; align-items: center; gap: 30px; z-index: 100; }
  .nav-corner a { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; }
  .nav-corner a:hover { color: var(--brand); }
  .theme-toggle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
  }
  .theme-toggle:hover { color: var(--brand); }
  .back-link { position: fixed; bottom: 40px; left: 40px; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); text-decoration: none; z-index: 100; transition: color 0.2s; }
  .back-link:hover { color: var(--brand); }

  main { padding: 0 0 100px; }

  .project-header {
    max-width: 720px;
    margin: 0 auto;
    padding: 120px 40px 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .project-category { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--brand); margin-bottom: 16px; }
  .project-title { font-size: 42px; font-weight: 400; line-height: 1.1; margin-bottom: 20px; }
  .project-desc { font-size: 15px; line-height: 1.7; color: var(--gray); }

  /* Hero Image - full viewport */
  .block-hero-image {
    width: 100vw;
    height: 100vh;
    margin-left: calc(-50vw + 50%);
    overflow: hidden;
  }
  .block-hero-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Hero Code - full viewport */
  .block-hero-code {
    width: 100vw;
    height: 100vh;
    margin-left: calc(-50vw + 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow: auto;
    padding: 40px;
  }
  .block-hero-code pre { color: var(--gray); }

  /* Title - left aligned */
  .block-title {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 40px 40px;
  }
  .block-title h2 {
    font-size: 32px;
    font-weight: 400;
    text-align: left;
  }

  /* Thinking Gallery - 1/3 text, 2/3 images */
  .block-thinking-gallery {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 0;
    min-height: 60vh;
  }
  .thinking-gallery-text {
    padding: 60px 48px;
    border-right: 1px solid var(--border);
  }
  .thinking-gallery-text h3 {
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  .thinking-gallery-text p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--gray);
  }
  .thinking-gallery-images {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-content: flex-start;
  }
  .thinking-gallery-images .img-full {
    width: 100%;
    padding: 2px;
  }
  .thinking-gallery-images .img-half {
    width: 50%;
    padding: 2px;
    box-sizing: border-box;
  }
  .thinking-gallery-images img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
    min-height: 200px;
  }

  /* Code Canvas */
  .block-code-canvas {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 40px;
  }
  .block-code-canvas .code-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gray);
    margin-bottom: 12px;
  }
  .block-code-canvas pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    overflow-x: auto;
    color: var(--gray);
  }

  /* Text block */
  .block-text {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 40px;
    font-size: 16px;
    line-height: 1.8;
  }
  .block-text p { margin-bottom: 1.5em; }
  .block-text h2 { font-size: 24px; font-weight: 400; margin: 2em 0 1em; }
  .block-text h3 { font-size: 18px; font-weight: 400; margin: 1.5em 0 0.75em; }
  .block-text blockquote {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    border-left: 2px solid var(--brand);
    padding-left: 24px;
    margin: 2em 0;
    color: var(--gray);
  }

  /* Text Sketchbook - text with images at random positions */
  .block-text-sketchbook {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 40px;
    position: relative;
  }
  .block-text-sketchbook .sketchbook-content {
    font-size: 16px;
    line-height: 1.8;
  }
  .block-text-sketchbook .sketchbook-content p { margin-bottom: 1.5em; }
  .block-text-sketchbook .sketchbook-images {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    margin-top: 32px;
    justify-content: space-around;
  }
  .block-text-sketchbook .sketchbook-images img {
    max-width: 280px;
    height: auto;
    opacity: 0.9;
  }

  /* Image block */
  .block-image {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 40px;
  }
  .block-image img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .block-image .caption {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    margin-top: 12px;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gray);
  }

  .error {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    color: var(--gray);
    text-align: center;
    padding: 80px 40px;
  }
  .error a { color: var(--brand); text-decoration: underline; }
</style>
</head>
<body>

<div class="logo"><a href="index.html">N.</a></div>
<nav class="nav-corner">
  <a href="index.html">Work</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">Light</button>
</nav>

<main id="main">
  <div class="loading" id="loading">Loading…</div>
  <div id="content" style="display: none;"></div>
  <div id="error" style="display: none;"></div>
</main>

<a href="index.html" class="back-link">← Back to Work</a>

<script>
const SANITY_PROJECT_ID = 'jihmnp1s';
const SANITY_DATASET = 'production';
const SANITY_API = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}`;
const PLACEHOLDER = 'https://placehold.co/1200x800/1a1a1a/444?text=Image';

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug') || '';
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function portableTextToHtml(blocks) {
  if (!blocks || !Array.isArray(blocks)) return '';
  return blocks.map(block => {
    if (block._type !== 'block' || !block.children) return '';
    const text = block.children.map(c => (c.text || '')).join('');
    if (!text) return '';
    const tag = block.style === 'h2' ? 'h2' : block.style === 'h3' ? 'h3' : block.style === 'blockquote' ? 'blockquote' : 'p';
    return `<${tag}>${escapeHtml(text)}</${tag}>`;
  }).join('');
}

// Dummy data matching the new block structure
const DUMMY_PROJECT = {
  title: "King's Command",
  category: 'GAME DESIGN',
  description: 'A turn-based tactics game where players command autonomous AI soldiers through natural language orders.',
  pageContent: [
    {
      _type: 'heroImage',
      _key: 'd1',
      imageUrl: 'https://placehold.co/1920x1080/0a0a0a/333?text=Hero+Image',
    },
    {
      _type: 'heroCode',
      _key: 'd2',
      code: `// Hero Code — full viewport
const orders = await parseNaturalLanguage(input);

orders.forEach(order => {
  const intent = extractIntent(order);
  execute(intent);
});`,
      language: 'javascript',
    },
    {
      _type: 'titleBlock',
      _key: 'd3',
      title: 'The premise',
    },
    {
      _type: 'textBlock',
      _key: 'd4',
      content: [
        {
          _type: 'block',
          style: 'normal',
          children: [{ _type: 'span', text: "What if you could command units in a tactics game the way you'd brief a team in real life? \"Flank from the left, hold fire until they're in range, retreat if outnumbered.\" The game became a vehicle for exploring how LLMs interpret tactical language." }],
        },
      ],
    },
    {
      _type: 'thinkingGallery',
      _key: 'd5',
      heading: 'Process & artefacts',
      body: 'Early iterations had the LLM generating moves directly. We switched to intent extraction + deterministic execution so players could debug behaviour.',
      images: [
        { imageUrl: 'https://placehold.co/800x600/111/444?text=Full+1', size: 'full' },
        { imageUrl: 'https://placehold.co/400x300/111/444?text=Half+1', size: 'half' },
        { imageUrl: 'https://placehold.co/400x300/111/444?text=Half+2', size: 'half' },
      ],
    },
    {
      _type: 'codeCanvas',
      _key: 'd6',
      title: 'order_parser.js',
      code: `function parseOrder(order) {
  const intent = llm.extract(order, schema);
  return intent.actions.map(a => new Action(a));
}`,
      language: 'javascript',
    },
    {
      _type: 'textSketchbook',
      _key: 'd7',
      content: [
        {
          _type: 'block',
          style: 'normal',
          children: [{ _type: 'span', text: 'A sketchbook-style section where text and images interleave. Images can float at random positions around the prose.' }],
        },
      ],
      imageUrls: [
        'https://placehold.co/280x180/111/444?text=Sketch+1',
        'https://placehold.co/280x180/111/444?text=Sketch+2',
        'https://placehold.co/280x180/111/444?text=Sketch+3',
      ],
    },
    {
      _type: 'imageBlock',
      _key: 'd8',
      imageUrl: 'https://placehold.co/800x450/111/444?text=Final+deliverable',
      caption: 'Alpha build — unit state visualization',
    },
  ],
};

async function fetchProject(slug) {
  const query = encodeURIComponent(`*[_type == "project" && slug.current == $slug][0] {
    title,
    category,
    description,
    "slug": slug.current,
    "headerImageUrl": mainImage.asset->url,
    pageContent[] {
      _type,
      _key,
      ...,
      "imageUrl": image.asset->url,
      _type == "thinkingGallery" => {
        "images": images[] {
          "imageUrl": image.asset->url,
          size
        }
      },
      _type == "textSketchbook" => {
        "imageUrls": images[].asset->url
      }
    }
  }`);
  const res = await fetch(`${SANITY_API}?query=${query}&$slug="${slug}"`);
  const data = await res.json();
  return data.result;
}

function renderBlock(block) {
  switch (block._type) {
    case 'heroImage':
      return `<div class="block-hero-image"><img src="${escapeHtml(block.imageUrl || PLACEHOLDER)}" alt=""></div>`;

    case 'heroCode':
      return `<div class="block-hero-code"><pre>${escapeHtml(block.code || '')}</pre></div>`;

    case 'titleBlock':
      return `<div class="block-title"><h2>${escapeHtml(block.title || '')}</h2></div>`;

    case 'thinkingGallery': {
      const imgs = (block.images || []).map(img => {
        const url = img.imageUrl || PLACEHOLDER;
        const cls = img.size === 'half' ? 'img-half' : 'img-full';
        return `<div class="${cls}"><img src="${escapeHtml(url)}" alt=""></div>`;
      }).join('');
      return `<div class="block-thinking-gallery">
        <div class="thinking-gallery-text">
          ${block.heading ? `<h3>${escapeHtml(block.heading)}</h3>` : ''}
          ${block.body ? `<p>${escapeHtml(block.body)}</p>` : ''}
        </div>
        <div class="thinking-gallery-images">${imgs}</div>
      </div>`;
    }

    case 'codeCanvas':
      return `<div class="block-code-canvas">
        ${block.title ? `<div class="code-header">${escapeHtml(block.title)}</div>` : ''}
        <pre>${escapeHtml(block.code || '')}</pre>
      </div>`;

    case 'textBlock':
      return `<div class="block-text">${portableTextToHtml(block.content)}</div>`;

    case 'textSketchbook': {
      const imgHtml = (block.imageUrls || []).map(url =>
        `<img src="${escapeHtml(url)}" alt="">`
      ).join('');
      return `<div class="block-text-sketchbook">
        <div class="sketchbook-content">${portableTextToHtml(block.content)}</div>
        ${imgHtml ? `<div class="sketchbook-images">${imgHtml}</div>` : ''}
      </div>`;
    }

    case 'imageBlock':
      return `<div class="block-image">
        <img src="${escapeHtml(block.imageUrl || PLACEHOLDER)}" alt="">
        ${block.caption ? `<div class="caption">${escapeHtml(block.caption)}</div>` : ''}
      </div>`;

    default:
      return '';
  }
}

function renderPageContent(blocks) {
  if (!blocks || !blocks.length) return '';
  return blocks.map(renderBlock).join('');
}

async function init() {
  const slug = getSlug();
  const loading = document.getElementById('loading');
  const content = document.getElementById('content');
  const errorEl = document.getElementById('error');

  // No slug = show dummy content as demo
  const slugToFetch = slug || 'demo';

  let project = slug ? await fetchProject(slug) : null;

  // Use dummy data when project not found or pageContent empty
  if (!project || !project.pageContent?.length) {
    project = {
      ...DUMMY_PROJECT,
      title: project?.title || DUMMY_PROJECT.title,
      category: project?.category || DUMMY_PROJECT.category,
      description: project?.description || DUMMY_PROJECT.description,
      pageContent: project?.pageContent?.length ? project.pageContent : DUMMY_PROJECT.pageContent,
    };
  }

  loading.style.display = 'none';

  document.title = `${project.title} — NIRUBAN`;

  const headerHtml = `
    <div class="project-header">
      <div class="project-category">${escapeHtml((project.category || '').toUpperCase())}</div>
      <h1 class="project-title">${escapeHtml(project.title)}</h1>
      ${project.description ? `<p class="project-desc">${escapeHtml(project.description)}</p>` : ''}
    </div>
  `;

  content.style.display = 'block';
  content.innerHTML = headerHtml + renderPageContent(project.pageContent);
}

function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? '' : 'light');
  document.getElementById('themeToggle').textContent = theme === 'dark' ? 'Light' : 'Dark';
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', isLight ? '' : 'light');
  localStorage.setItem('theme', isLight ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = isLight ? 'Light' : 'Dark';
});

initTheme();
init();
</script>

</body>
</html>
