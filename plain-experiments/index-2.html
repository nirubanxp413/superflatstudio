<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIRUBAN — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0a0a0a;
    --white: #f0f0f0;
    --gray: #666;
    --border: #333;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    cursor: crosshair;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .page {
    display: grid;
    grid-template-columns: 50% 50%;
    height: 100vh;
  }

  /* LEFT */
  .carousel-section {
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  .carousel-stage {
    position: absolute;
    inset: 0;
  }

  .card {
    position: absolute;
    left: 50%;
    top: 50%;
    border: 2px solid var(--white);
    border-radius: 10px;
    background: var(--black);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    will-change: transform, opacity;
    pointer-events: none;
    transition: background 0.25s, border-color 0.25s;
  }

  .card::before {
    content: attr(data-number);
    position: absolute;
    top: 16px;
    right: 18px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gray);
    font-family: 'Space Mono', monospace;
    transition: color 0.25s;
  }

  .card-inner {
    padding: 22px 24px;
  }

  .card-category {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
    transition: color 0.25s;
  }

  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1.15;
    color: var(--white);
    transition: color 0.25s;
  }

  .card-line {
    width: 32px;
    height: 1px;
    background: var(--white);
    margin-top: 12px;
    transition: background 0.25s;
  }

  .card.active {
    background: var(--white);
    border-color: var(--white);
  }

  .card.active .card-title { color: var(--black); }
  .card.active .card-category { color: #555; }
  .card.active .card-line { background: var(--black); }
  .card.active::before { color: #999; }

  /* RIGHT */
  .info-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 64px;
    position: relative;
  }

  .header-tag {
    position: absolute;
    top: 40px;
    left: 64px;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 64px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .scroll-hint .arrow {
    display: inline-block;
    animation: bounce 1.8s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }

  .project-number {
    font-size: 100px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    line-height: 1;
    color: var(--border);
    margin-bottom: 16px;
    user-select: none;
  }

  .project-category {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 16px;
  }

  .project-title {
    font-family: 'Instrument Serif', serif;
    font-size: 48px;
    line-height: 1.05;
    margin-bottom: 20px;
    max-width: 440px;
  }

  .project-desc {
    font-size: 13px;
    line-height: 1.7;
    color: var(--gray);
    max-width: 360px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--white);
    margin: 28px 0;
  }

  .project-cta {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    border-bottom: 1px solid var(--white);
    padding-bottom: 2px;
    display: inline-block;
    transition: padding-bottom 0.3s ease;
    cursor: pointer;
  }

  .project-cta:hover { padding-bottom: 6px; }

  .info-content {
    transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .info-content.out {
    opacity: 0;
    transform: translateY(14px);
  }

  /* NAV */
  .nav-corner {
    position: fixed;
    top: 36px;
    right: 50px;
    display: flex;
    gap: 30px;
    z-index: 100;
  }

  .nav-corner a {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gray);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .nav-corner a:hover { color: var(--white); }

  .logo {
    position: fixed;
    top: 34px;
    left: 40px;
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    z-index: 100;
  }

  .counter {
    position: fixed;
    bottom: 40px;
    right: 50px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gray);
    z-index: 100;
  }

  .counter .current-num { color: var(--white); font-size: 13px; }

  .progress-track {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 180px;
    background: var(--border);
    z-index: 100;
  }

  .progress-fill {
    position: absolute;
    top: 0;
    width: 100%;
    background: var(--white);
    transition: height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
</style>
</head>
<body>

<div class="logo">N.</div>

<nav class="nav-corner">
  <a href="#">Work</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="page">
  <div class="carousel-section">
    <div class="carousel-stage" id="stage"></div>
  </div>

  <div class="info-section">
    <div class="header-tag">Selected Works</div>
    <div class="info-content" id="infoContent">
      <div class="project-number" id="projNum">01</div>
      <div class="project-category" id="projCat">GAME DESIGN</div>
      <div class="project-title" id="projTitle">King's Command</div>
      <div class="project-desc" id="projDesc">A turn-based tactics game where players command autonomous AI soldiers through natural language orders.</div>
      <div class="divider"></div>
      <span class="project-cta">View Project →</span>
    </div>
    <div class="scroll-hint">
      <span class="arrow">↓</span> Scroll to explore
    </div>
  </div>
</div>

<div class="counter">
  <span class="current-num" id="counterCurrent">01</span> / <span id="counterTotal">08</span>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progressFill"></div>
</div>

<script>
const projects = [
  { title: "King's Command", category: "GAME DESIGN", desc: "A turn-based tactics game where players command autonomous AI soldiers through natural language orders." },
  { title: "Tone Modulator", category: "CREATIVE TOOL", desc: "A guitar pedal-style interface for LLM tone transformation — modular synthesizer meets prompt engineering." },
  { title: "Tamil Glyphs", category: "GENERATIVE ART", desc: "Parametric explorations of Tamil script through computational design and procedural typography." },
  { title: "RedOwl Platform", category: "PRODUCT DESIGN", desc: "An agentic AI platform for working capital management — from deterministic tools to intelligent automation." },
  { title: "Signal Chain", category: "INTERACTIVE", desc: "A visual programming environment for chaining LLM transformations like audio signal processors." },
  { title: "Invoice Engine", category: "SYSTEMS DESIGN", desc: "Automated document processing workflows with customizable visual styling and intelligent extraction." },
  { title: "Cortez Deck", category: "STRATEGY", desc: "Strategic narrative design for an AI-first architectural pivot — the point of no return." },
  { title: "Data Currents", category: "DATA VIZ", desc: "Financial data streams visualized as living topographies — where numbers become landscapes." },
];

const TOTAL = projects.length;
const NUM_VISIBLE = 21;
const HALF = Math.floor(NUM_VISIBLE / 2);

// Random rotations and X offsets per project
const cardRotations = [];
const cardXOffsets = [];
for (let i = 0; i < TOTAL; i++) {
  const seedR = Math.sin(i * 137.508 + 42) * 10000;
  const magnitude = 10 + (seedR - Math.floor(seedR)) * 20; // 10-30 degrees
  const sign = Math.sin(i * 53.1 + 7) > 0 ? 1 : -1;
  cardRotations.push(magnitude * sign);
  const seedX = Math.sin(i * 251.73 + 97) * 10000;
  cardXOffsets.push((seedX - Math.floor(seedX)) * 300 - 150); // ±150px
}

// Physics
let position = 0;
let velocity = 0;
let lastActiveIdx = 0;

const FRICTION = 0.82;
const SCROLL_MULT = 0.0003;
const SNAP_PULL = 0.08;
const VELOCITY_DEAD = 0.0008;
const SETTLE_DEAD = 0.003;

// Dynamic card size based on viewport
let CARD_BASE;
let STAGE_H;

function measureSizes() {
  STAGE_H = window.innerHeight;
  // Card is a big square — take up ~40% of viewport height
  CARD_BASE = Math.min(STAGE_H * 0.4, window.innerWidth * 0.5 * 0.7);
}
measureSizes();
window.addEventListener('resize', () => {
  measureSizes();
  renderCards(position);
});

// DOM
const stage = document.getElementById('stage');
const infoContent = document.getElementById('infoContent');
const projNum = document.getElementById('projNum');
const projCat = document.getElementById('projCat');
const projTitle = document.getElementById('projTitle');
const projDesc = document.getElementById('projDesc');
const counterCurrent = document.getElementById('counterCurrent');
const progressFill = document.getElementById('progressFill');
document.getElementById('counterTotal').textContent = String(TOTAL).padStart(2, '0');

// Build cards
const cards = [];
for (let i = 0; i < NUM_VISIBLE; i++) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = '<div class="card-inner"><div class="card-category"></div><div class="card-title"></div><div class="card-line"></div></div>';
  stage.appendChild(el);
  cards.push(el);
}

function mod(n, m) { return ((n % m) + m) % m; }

function renderCards(pos) {
  const roundedCenter = Math.round(pos);
  const fractional = pos - roundedCenter;

  for (let i = 0; i < NUM_VISIBLE; i++) {
    const slotOffset = i - HALF;
    const continuousOffset = slotOffset - fractional;
    const absOff = Math.abs(continuousOffset);

    const projIdx = mod(roundedCenter + slotOffset, TOTAL);
    const proj = projects[projIdx];
    const card = cards[i];

    // Content
    card.setAttribute('data-number', absOff < 6 ? String(projIdx + 1).padStart(2, '0') : '');
    card.querySelector('.card-category').textContent = proj.category;
    card.querySelector('.card-title').textContent = proj.title;

    // Scale: center=1, shrinks as it recedes
    const scale = Math.max(0.25, 1 - absOff * 0.1);
    const size = CARD_BASE * scale;

    // Y position: distribute cards to fill full viewport height
    // Each step pushes card by half its own height + half neighbor height + gap
    const gap = 8;
    const stepSize = size * 0.52 + gap;
    const y = continuousOffset * stepSize;

    // Rotation: unique per card, eases to 0 at center
    const baseRot = cardRotations[projIdx];
    const rotEase = Math.min(1, absOff * 0.4);
    const rotation = baseRot * rotEase;

    // X offset: unique per card, eases to 0 at center
    const baseX = cardXOffsets[projIdx];
    const xEase = Math.min(1, absOff * 0.4);
    const xOff = baseX * xEase;

    // Opacity
    const opacity = Math.max(0, 1 - absOff * 0.12);

    // Z-index
    const zIdx = 300 - Math.round(absOff * 10);

    // Apply
    card.style.width = size + 'px';
    card.style.height = size + 'px';
    card.style.transform = `translate(-50%, -50%) translate(${xOff}px, ${y}px) rotate(${rotation}deg)`;
    card.style.opacity = opacity;
    card.style.zIndex = zIdx;

    // Active
    card.classList.toggle('active', absOff < 0.45);
  }
}

function updateInfoPanel(idx) {
  if (idx === lastActiveIdx) return;
  lastActiveIdx = idx;

  const proj = projects[idx];
  infoContent.classList.add('out');

  setTimeout(() => {
    projNum.textContent = String(idx + 1).padStart(2, '0');
    projCat.textContent = proj.category;
    projTitle.textContent = proj.title;
    projDesc.textContent = proj.desc;
    counterCurrent.textContent = String(idx + 1).padStart(2, '0');
    progressFill.style.height = ((idx + 1) / TOTAL * 100) + '%';
    infoContent.classList.remove('out');
  }, 160);
}

function tick() {
  velocity *= FRICTION;

  if (Math.abs(velocity) < VELOCITY_DEAD) {
    const nearest = Math.round(position);
    const diff = nearest - position;
    if (Math.abs(diff) < SETTLE_DEAD) {
      position = nearest;
      velocity = 0;
    } else {
      position += diff * SNAP_PULL;
    }
  }

  position += velocity;
  renderCards(position);

  const activeIdx = mod(Math.round(position), TOTAL);
  updateInfoPanel(activeIdx);

  requestAnimationFrame(tick);
}

// Wheel
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  velocity += e.deltaY * SCROLL_MULT;
  // Cap velocity so fast trackpads/mice don't overshoot
  velocity = Math.max(-0.4, Math.min(0.4, velocity));
}, { passive: false });

// Touch
let touchY = 0;
window.addEventListener('touchstart', (e) => {
  touchY = e.touches[0].clientY;
  velocity = 0;
});
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const y = e.touches[0].clientY;
  velocity = (touchY - y) * 0.004;
  touchY = y;
}, { passive: false });

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') velocity += 0.1;
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') velocity -= 0.1;
});

// Init
renderCards(0);
updateInfoPanel(0);
progressFill.style.height = (1 / TOTAL * 100) + '%';
requestAnimationFrame(tick);
</script>

</body>
</html>
